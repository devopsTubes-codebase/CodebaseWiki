apiVersion: apps/v1
kind: Deployment
metadata:
  name: codebase-wiki
  namespace: wiki-team
  labels:
    app: codebase-wiki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codebase-wiki
  template:
    metadata:
      labels:
        app: codebase-wiki
    spec:
      containers:
        - name: web
          image: docker.io/hshinosa/codebase-wiki:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: codebase-wiki-env
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
